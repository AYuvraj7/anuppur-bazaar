<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जिला बाज़ार — अपने व्यापार की मुफ़्त पहचान</title>
<style>
  :root{
    --cream:#FBF6EE;
    --paper:#FFFFFF;
    --ink:#2B2420;
    --ink-soft:#6B5E52;
    --terracotta:#C2542E;
    --terracotta-dark:#8C3A1F;
    --amber:#E0972A;
    --amber-light:#FCEFD8;
    --green:#3C7A4B;
    --line:#E7DCC9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Noto Sans Devanagari', 'Segoe UI', system-ui, sans-serif;
    background:var(--cream);
    color:var(--ink);
  }
  .wrap{max-width:720px;margin:0 auto;padding:0 0 60px;}
  header{
    background:var(--terracotta);
    color:#fff;
    padding:28px 20px 22px;
    text-align:center;
    border-bottom:6px solid var(--terracotta-dark);
  }
  header h1{margin:0 0 4px;font-size:24px;font-weight:700;letter-spacing:.5px;}
  header p{margin:0;font-size:13px;opacity:.92;}
  .district-bar{
    display:flex;gap:8px;justify-content:center;align-items:center;
    margin-top:14px;flex-wrap:wrap;
  }
  .district-bar input{
    padding:8px 12px;border-radius:8px;border:none;font-size:14px;
    width:200px;text-align:center;
  }
  .district-bar button{
    background:var(--amber);color:#2B2420;border:none;padding:9px 16px;
    border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;
  }
  .tabs{
    display:flex;margin:18px 20px 0;border-radius:12px;overflow:hidden;
    border:1px solid var(--line);
  }
  .tab{
    flex:1;padding:13px;text-align:center;background:var(--paper);
    cursor:pointer;font-weight:700;font-size:14px;color:var(--ink-soft);
    border:none;
  }
  .tab.active{background:var(--terracotta);color:#fff;}
  section{padding:20px;}
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:14px;
  }
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:12px 0 5px;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=tel],textarea,select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--ink);
  }
  textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .submit-btn{
    margin-top:18px;width:100%;background:var(--green);color:#fff;border:none;
    padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  }
  .submit-btn:active{transform:scale(.98);}
  .search-bar{display:flex;gap:8px;margin-bottom:16px;}
  .search-bar input{flex:1;}
  .search-bar select{width:150px;}
  .biz-card{
    background:var(--paper);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:12px;
  }
  .biz-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .biz-name{font-size:16px;font-weight:700;margin:0;}
  .biz-cat{
    display:inline-block;background:var(--amber-light);color:var(--terracotta-dark);
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:5px;
  }
  .biz-desc{font-size:13px;color:var(--ink-soft);margin:8px 0;line-height:1.5;}
  .biz-addr{font-size:12px;color:var(--ink-soft);margin:4px 0 10px;}
  .biz-actions{display:flex;gap:8px;}
  .biz-actions a{
    flex:1;text-align:center;padding:9px;border-radius:8px;font-size:13px;
    font-weight:700;text-decoration:none;
  }
  .call-btn{background:var(--amber-light);color:var(--terracotta-dark);}
  .wa-btn{background:#dcf2e1;color:var(--green);}
  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 20px;font-size:14px;
  }
  .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .msg{
    text-align:center;padding:12px;border-radius:10px;font-size:14px;font-weight:700;
    margin-bottom:14px;
  }
  .msg.ok{background:#dcf2e1;color:var(--green);}
  .footer-note{
    text-align:center;font-size:12px;color:var(--ink-soft);padding:0 20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>अनूपपुर बाज़ार</h1>
    <p>अनूपपुर ज़िले के व्यापारियों की मुफ़्त ऑनलाइन पहचान</p>
  </header>

  <div class="tabs">
    <button class="tab active" id="tabBrowse" onclick="switchTab('browse')">व्यापारी खोजें</button>
    <button class="tab" id="tabAdd" onclick="switchTab('add')">अपना व्यापार जोड़ें</button>
  </div>

  <section id="browseSection">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="नाम, गाँव/शहर या पिन कोड खोजें...">
      <select id="categoryFilter"></select>
    </div>
    <div id="listMsg"></div>
    <div id="bizList"></div>
  </section>

  <section id="addSection" style="display:none;">
    <div class="card">
      <div id="addMsg"></div>
      <label>दुकान / व्यापार का नाम *</label>
      <input type="text" id="fName" placeholder="जैसे: शर्मा जनरल स्टोर">

      <label>श्रेणी *</label>
      <select id="fCategory">
        <option value="किराना">किराना / जनरल स्टोर</option>
        <option value="कपड़ा">कपड़ा / बुटीक</option>
        <option value="इलेक्ट्रॉनिक्स">इलेक्ट्रॉनिक्स / मोबाइल</option>
        <option value="हार्डवेयर">हार्डवेयर / निर्माण सामग्री</option>
        <option value="मेडिकल">मेडिकल / फार्मेसी</option>
        <option value="खाना">खाना / रेस्टोरेंट</option>
        <option value="ब्यूटी">ब्यूटी पार्लर / सैलून</option>
        <option value="शिक्षा">कोचिंग / शिक्षा</option>
        <option value="ऑटो">ऑटो रिपेयर / गैराज</option>
        <option value="ज्वेलरी">ज्वेलरी / सर्राफा</option>
        <option value="अन्य">अन्य सेवा</option>
      </select>

      <label>मालिक का नाम</label>
      <input type="text" id="fOwner" placeholder="आपका नाम">

      <div class="row2">
        <div>
          <label>फ़ोन नंबर *</label>
          <input type="tel" id="fPhone" placeholder="98xxxxxxxx">
        </div>
        <div>
          <label>WhatsApp नंबर</label>
          <input type="tel" id="fWhatsapp" placeholder="98xxxxxxxx">
        </div>
      </div>

      <label>गाँव / शहर का नाम *</label>
      <input type="text" id="fTown" placeholder="जैसे: कोतमा, जैतहरी, अनूपपुर शहर">

      <label>पता / मोहल्ला *</label>
      <input type="text" id="fAddress" placeholder="जैसे: मेन रोड">

      <label>पिन कोड *</label>
      <input type="text" id="fPincode" placeholder="जैसे: 484224" maxlength="6">

      <label>संक्षिप्त जानकारी</label>
      <textarea id="fDesc" placeholder="आप क्या बेचते हैं या क्या सेवा देते हैं..."></textarea>

      <button class="submit-btn" onclick="submitBusiness()">व्यापार जोड़ें</button>
      <p class="hint">यह जानकारी सबको दिखेगी ताकि ग्राहक आपसे सीधे संपर्क कर सकें।</p>
    </div>
  </section>

  <p class="footer-note">यह एक स्थानीय, मुफ़्त डायरेक्टरी है — सभी जानकारी सार्वजनिक रूप से सबको दिखती है।</p>
  <p class="footer-note" style="margin-top:6px;font-weight:700;">Thrive Skills Educational Society की ओर से — निर्माण: Hector365</p>
</div>

<script>
const CATEGORIES = ["किराना","कपड़ा","इलेक्ट्रॉनिक्स","हार्डवेयर","मेडिकल","खाना","ब्यूटी","शिक्षा","ऑटो","ज्वेलरी","अन्य"];

function switchTab(tab){
  document.getElementById('tabBrowse').classList.toggle('active', tab==='browse');
  document.getElementById('tabAdd').classList.toggle('active', tab==='add');
  document.getElementById('browseSection').style.display = tab==='browse' ? 'block':'none';
  document.getElementById('addSection').style.display = tab==='add' ? 'block':'none';
}

function populateCategoryFilter(){
  const sel = document.getElementById('categoryFilter');
  sel.innerHTML = '<option value="">सभी श्रेणियाँ</option>' +
    CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
}

async function saveDistrict(){ /* district fixed to Anuppur */ }

async function loadDistrict(){ /* district fixed to Anuppur, no-op */ }

function genId(){
  return 'b' + Date.now() + Math.floor(Math.random()*1000);
}

async function submitBusiness(){
  const name = document.getElementById('fName').value.trim();
  const category = document.getElementById('fCategory').value;
  const owner = document.getElementById('fOwner').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const whatsapp = document.getElementById('fWhatsapp').value.trim();
  const address = document.getElementById('fAddress').value.trim();
  const town = document.getElementById('fTown').value.trim();
  const pincode = document.getElementById('fPincode').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const msgEl = document.getElementById('addMsg');

  if(!name || !phone || !address || !pincode || !town){
    msgEl.innerHTML = '<div class="msg" style="background:#fbe1de;color:#8C3A1F;">कृपया नाम, फ़ोन नंबर, गाँव/शहर, पता और पिन कोड भरें।</div>';
    return;
  }

  const id = genId();
  const data = {id, name, category, owner, phone, whatsapp, town, address, pincode, desc, createdAt: Date.now()};

  try{
    const result = await window.storage.set('biz:' + id, JSON.stringify(data), true);
    if(result){
      msgEl.innerHTML = '<div class="msg ok">आपका व्यापार जोड़ दिया गया है। अब ग्राहक आपको खोज सकते हैं।</div>';
      document.getElementById('fName').value='';
      document.getElementById('fOwner').value='';
      document.getElementById('fPhone').value='';
      document.getElementById('fWhatsapp').value='';
      document.getElementById('fAddress').value='';
      document.getElementById('fTown').value='';
      document.getElementById('fPincode').value='';
      document.getElementById('fDesc').value='';
      setTimeout(()=>{ switchTab('browse'); loadBusinesses(); }, 1200);
    }else{
      msgEl.innerHTML = '<div class="msg" style="background:#fbe1de;color:#8C3A1F;">कुछ गड़बड़ हुई, दोबारा कोशिश करें।</div>';
    }
  }catch(e){
    console.error(e);
    msgEl.innerHTML = '<div class="msg" style="background:#fbe1de;color:#8C3A1F;">कुछ गड़बड़ हुई, दोबारा कोशिश करें।</div>';
  }
}

let ALL_BUSINESSES = [];

async function loadBusinesses(){
  const listMsg = document.getElementById('listMsg');
  const listEl = document.getElementById('bizList');
  listMsg.innerHTML = '<p class="empty">लोड हो रहा है...</p>';
  listEl.innerHTML = '';
  try{
    const keysResult = await window.storage.list('biz:', true);
    const keys = (keysResult && keysResult.keys) ? keysResult.keys : [];
    if(keys.length === 0){
      listMsg.innerHTML = '<p class="empty">अभी तक कोई व्यापार पंजीकृत नहीं है। पहला बनिए!</p>';
      ALL_BUSINESSES = [];
      return;
    }
    const items = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) items.push(JSON.parse(r.value));
      }catch(e){ /* skip missing */ }
    }
    items.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
    ALL_BUSINESSES = items;
    listMsg.innerHTML = '';
    renderList();
  }catch(e){
    console.error(e);
    listMsg.innerHTML = '<p class="empty">सूची लोड नहीं हो सकी।</p>';
  }
}

function renderList(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const listEl = document.getElementById('bizList');
  const listMsg = document.getElementById('listMsg');

  let filtered = ALL_BUSINESSES.filter(b=>{
    const matchesQ = !q || b.name.toLowerCase().includes(q) || (b.desc||'').toLowerCase().includes(q) || (b.town||'').toLowerCase().includes(q) || (b.pincode||'').includes(q);
    const matchesCat = !cat || b.category === cat;
    return matchesQ && matchesCat;
  });

  if(filtered.length === 0){
    listMsg.innerHTML = '<p class="empty">कोई व्यापार नहीं मिला।</p>';
    listEl.innerHTML = '';
    return;
  }
  listMsg.innerHTML = '';
  listEl.innerHTML = filtered.map(b=>{
    const waNum = (b.whatsapp || b.phone).replace(/\D/g,'');
    const waLink = waNum ? `https://wa.me/91${waNum.replace(/^91/,'')}` : '';
    return `
      <div class="biz-card">
        <div class="biz-top">
          <div>
            <p class="biz-name">${escapeHtml(b.name)}</p>
            <span class="biz-cat">${escapeHtml(b.category||'अन्य')}</span>
          </div>
        </div>
        ${b.desc ? `<p class="biz-desc">${escapeHtml(b.desc)}</p>` : ''}
        <p class="biz-addr">${escapeHtml(b.town||'')}${b.town ? ' · ' : ''}${escapeHtml(b.address)}${b.pincode ? ' - ' + escapeHtml(b.pincode) : ''}${b.owner ? ' · ' + escapeHtml(b.owner) : ''}</p>
        <div class="biz-actions">
          <a class="call-btn" href="tel:${escapeHtml(b.phone)}">कॉल करें</a>
          ${waLink ? `<a class="wa-btn" href="${waLink}" target="_blank">WhatsApp</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('categoryFilter').addEventListener('change', renderList);

populateCategoryFilter();
loadDistrict();
loadBusinesses();
</script>
</body>
</html>
